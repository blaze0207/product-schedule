        function renderTable() {
            const tbody = document.getElementById('tableBody');
            const search = document.getElementById('mainSearch').value.toLowerCase();
            tbody.innerHTML = '';
            const filtered = rawData.filter(d => `${d.machine} ${d.batch} ${d.spec} ${d.note}`.toLowerCase().includes(search));
            filtered.forEach(d => {
                const tr = document.createElement('tr');
                if (d.td_actual === 0) tr.className = 'inactive';
                const demandLabel = d.demand >= 0 ? '盈餘' : '缺';
                const demandColor = d.demand >= 0 ? 'var(--success)' : '#64748b';
                tr.innerHTML = `
                    <td data-label="機台狀態"><div class="td-content"><span class="machine-tag">${d.machine}</span>${d.status_text ? `<div style="color:var(--danger); font-size:11px; font-weight:bold;">● ${d.status_text}</div>` : ''}</div></td>
                    <td data-label="批號"><div class="td-content"><div style="font-weight:900;">${d.batch}</div><div style="font-size:11px; color:#94a3b8;">${d.note || ''}</div></div></td>
                    <td data-label="規格"><div class="td-content">${d.spec}</div></td>
                    <td data-label="日產"><div class="td-content"><div style="font-size:11px; color:#94a3b8;">計: ${d.td_plan.toFixed(2)}</div><div style="font-weight:bold; color:var(--accent);">實: ${d.td_actual.toFixed(2)}</div></div></td>
                    <td data-label="生產天數"><div class="td-content">${d.days_active} 天</div></td>
                    <td data-label="已繳庫量"><div class="td-content"><div style="font-weight:bold;">${Math.round(d.stored).toLocaleString()}</div><div class="progress-container"><div class="progress-fill" style="width:${d.pct}%"></div></div></div></td>
                    <td data-label="預計完工"><div class="td-content"><span class="badge badge-success">${d.finish_forecast}</span><div style="font-size:10px; color:${demandColor};">${demandLabel}: ${Math.round(Math.abs(d.demand)).toLocaleString()}</div></div></td>
                    <td data-label="POY預警"><div class="td-content"><div style="font-weight:bold; font-size:12px;">${d.poy}</div><div style="color:${d.poy_days < 3 ? 'var(--danger)' : (d.poy_days < 5 ? 'var(--warning)' : 'var(--success)')}; font-weight:bold;">${d.poy_days > 99 ? '---' : d.poy_days.toFixed(1) + ' 天'}</div></div></td>
                `;
                tbody.appendChild(tr);
            });
        }
        document.getElementById('mainSearch').addEventListener('input', renderTable);
        renderTable();
