            });
            
            filtered.forEach(item => {
                const tdPlan = item.td_plan;
                const tdAct = item.td_actual;
                const tdDiff = tdAct - tdPlan;
                const tdClass = tdDiff >= 0 ? 'td-up' : 'td-down';
                const tdIcon = tdDiff >= 0 ? '▲' : '▼';
                
                let gradeHtml = `<b>${Math.round(item.stored).toLocaleString()}</b><br>`;
                Object.keys(item.grades).forEach(g => { 
                    gradeHtml += `<span style="font-size:10px; margin-right:4px; color:#64748b">${g}:${Math.round(item.grades[g]).toLocaleString()}</span>`; 
                });

                let forecastHtml = "";
                if (item.finish_forecast) {
                    const label = item.finish_forecast === "達標" ? "達標" : "預計完工: " + item.finish_forecast;
                    const warnClass = item.forecast_level === "warning" ? "warning" : "";
                    forecastHtml = `<div class="forecast-tag ${warnClass}">${label}</div>`;
                }
                
                const statusTag = item.status_text ? `<div style="font-size:10px; color:#ef4444; margin-top:4px; font-weight:bold">● ${item.status_text}</div>` : "";
                
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td data-label="機台">
                        <span class="badge machine-tag">${item.machine}</span>
                        ${statusTag}
                    </td>
                    <td data-label="批號 (計畫/現場)">
                        <span class="status-dot dot-${item.status}"></span><b>${item.batch}</b>
                        <div style="font-size:11px; color:#64748b; margin-top:4px">現場: ${item.actual_batch || "---"}</div>
                        ${forecastHtml}
                    </td>
                    <td data-label="生產效率 (T/D)">
                        <div class="td-box">
                            計: ${tdPlan.toFixed(2)}<br>
                            現: <span class="${tdClass}">${tdAct.toFixed(2)}</span> 
                            <small class="${tdClass}">${tdIcon}${Math.abs(tdDiff).toFixed(2)}</small>
                        </div>
                    </td>
                    <td data-label="規格"><small>${item.spec}</small></td>
                    <td data-label="排產日期"><small>${item.date_range}</small></td>
                    <td data-label="排產量">${Math.round(item.target).toLocaleString()}</td>
                    <td data-label="已繳庫">${gradeHtml}</td>
                    <td data-label="進度">
                        <div class="progress-bar-container"><div class="progress-inner" style="width: ${item.pct}%"></div></div>
                        <div style="font-size:10px">${item.pct.toFixed(0)}%</div>
                    </td>
                    <td data-label="需求量" style="color:${item.demand >= 0 ? '#22c55e' : '#ef4444'}; font-weight:bold">
                        ${item.demand >= 0 ? '+' : ''}${Math.round(item.demand).toLocaleString()}
                    </td>
                    <td data-label="POY資訊"><small>${item.poy}<br>${item.poy_spec}</small></td>
                `;
                tableBody.appendChild(row);
            });
        }
        searchInput.addEventListener('input', (e) => renderTable(e.target.value));
        renderTable();
    </script>
</body>
</html>
